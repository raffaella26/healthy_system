<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>增重健康系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(160deg, #DCFCE7 0%, #F0FDF4 100%);
            color: #14532D;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2.5rem; font-weight: 300; color: #14532D; }
        .header p { color: #65A30D; font-size: 14px; margin-top: 8px; }
        .card {
            background: rgba(255,255,255,0.9);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(34,197,94,0.1);
            border: 1px solid rgba(255,255,255,0.95);
        }
        .card-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px;
        }
        .card-title {
            font-size: 18px; font-weight: 600; color: #14532D;
        }
        .stats {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;
            margin-bottom: 15px;
        }
        .stat-item {
            text-align: center; padding: 12px; border-radius: 12px;
            background: rgba(34,197,94,0.1);
        }
        .stat-value {
            font-size: 18px; font-weight: 700; color: #14532D;
        }
        .stat-label {
            font-size: 12px; color: #65A30D; margin-top: 4px;
        }
        .meal-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
            margin-bottom: 15px;
        }
        .meal-item {
            text-align: center; padding: 12px; border-radius: 12px;
            background: rgba(34,197,94,0.08);
        }
        .meal-item.empty {
            background: #f8f8f8; color: #999;
        }
        .meal-calories {
            font-size: 16px; font-weight: 600;
        }
        .meal-name {
            font-size: 12px; margin-top: 4px;
        }
        .exercise-item {
            background: rgba(59,130,246,0.1); padding: 12px; border-radius: 12px;
            margin-bottom: 10px;
        }
        .sleep-info {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px;
        }
        .btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            font-size: 16px; font-weight: 600; color: white;
            margin: 5px 0; cursor: pointer;
        }
        .btn-green {
            background: linear-gradient(135deg, #22C55E, #16A34A);
            box-shadow: 0 4px 20px rgba(34,197,94,0.3);
        }
        .btn-blue {
            background: linear-gradient(135deg, #3B82F6, #2563EB);
            box-shadow: 0 4px 20px rgba(59,130,246,0.3);
        }
        .btn-purple {
            background: linear-gradient(135deg, #9333EA, #7C3AED);
            box-shadow: 0 4px 20px rgba(147,51,234,0.3);
        }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000;
        }
        .modal-content {
            background: white; margin: 20px; padding: 20px; border-radius: 20px;
            max-height: 80vh; overflow-y: auto;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block; margin-bottom: 5px; font-weight: 500; color: #14532D;
        }
        .form-group input, .form-group select {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 14px; background: #f8f9fa;
        }
        .quick-buttons {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
            margin: 10px 0;
        }
        .quick-btn {
            padding: 8px; border: 1px solid #ddd; border-radius: 6px;
            font-size: 12px; background: white; cursor: pointer;
        }
        .close-btn {
            position: absolute; top: 10px; right: 15px; font-size: 24px;
            background: none; border: none; color: #666; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💪 增重健康系统</h1>
            <p>科学增重，健康生活 | 本周目标：+0.5kg</p>
        </div>

        <!-- 今日概览 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">📊 今日概览</div>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value">65.2kg</div>
                    <div class="stat-label">当前体重</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">+210</div>
                    <div class="stat-label">热量盈余</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">1,850</div>
                    <div class="stat-label">已摄入</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">7.5h</div>
                    <div class="stat-label">睡眠时长</div>
                </div>
            </div>
        </div>

        <!-- 饮食记录 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">🍽️ 饮食记录</div>
                <span style="color: #22C55E; font-size: 14px;">1,850/2,800 kcal</span>
            </div>
            <div class="meal-grid">
                <div class="meal-item">
                    <div class="meal-calories">450</div>
                    <div class="meal-name">早餐</div>
                </div>
                <div class="meal-item empty">
                    <div class="meal-calories">-</div>
                    <div class="meal-name">午餐</div>
                </div>
                <div class="meal-item empty">
                    <div class="meal-calories">-</div>
                    <div class="meal-name">晚餐</div>
                </div>
                <div class="meal-item">
                    <div class="meal-calories">300</div>
                    <div class="meal-name">加餐</div>
                </div>
            </div>
            <button class="btn btn-green" onclick="openFoodModal()">+ 添加食物</button>
        </div>

        <!-- 运动记录 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">💪 运动记录</div>
                <span style="color: #3B82F6; font-size: 14px;">320 kcal</span>
            </div>
            <div class="exercise-item">
                <div style="font-weight: 600;">🏋️ 胸部训练</div>
                <div style="font-size: 12px; color: #666; margin-top: 4px;">杠铃卧推: 4组 × 8次 × 60kg</div>
            </div>
            <button class="btn btn-blue" onclick="openExerciseModal()">+ 添加运动</button>
        </div>

        <!-- 睡眠记录 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">😴 睡眠记录</div>
                <span style="color: #9333EA; font-size: 14px;">7.5/8 小时</span>
            </div>
            <div class="sleep-info">
                <div>
                    <div style="font-weight: 600;">睡眠质量</div>
                    <div style="font-size: 12px; color: #7C3AED; margin-top: 4px;">良好</div>
                </div>
                <div style="text-align: right;">
                    <div style="font-weight: 600;">22:30 - 06:00</div>
                    <div style="font-size: 12px; color: #666; margin-top: 4px;">规律作息</div>
                </div>
            </div>
            <button class="btn btn-purple" onclick="openSleepModal()">📝 记录睡眠</button>
        </div>
    </div>

    <!-- 模态框 -->
    <div id="foodModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeFoodModal()">×</button>
            <h3 style="margin-bottom: 20px; color: #14532D;">添加食物</h3>
            <div class="form-group">
                <label>食物名称</label>
                <input type="text" id="foodName" placeholder="输入食物名称">
            </div>
            <div class="form-group">
                <label>分量估算</label>
                <select id="foodAmount">
                    <option value="small">少量 (手掌大小)</option>
                    <option value="medium">中等 (一个拳头)</option>
                    <option value="large">大量 (两个拳头)</option>
                </select>
            </div>
            <div class="form-group">
                <label>预估热量</label>
                <input type="number" id="foodCalories" placeholder="预估热量 (kcal)">
            </div>
            <div>
                <label>快速选择</label>
                <div class="quick-buttons">
                    <button class="quick-btn" onclick="quickAddFood('米饭', 'medium', 200)">米饭</button>
                    <button class="quick-btn" onclick="quickAddFood('鸡胸肉', 'medium', 150)">鸡胸肉</button>
                    <button class="quick-btn" onclick="quickAddFood('鸡蛋', 'small', 80)">鸡蛋</button>
                    <button class="quick-btn" onclick="quickAddFood('牛奶', 'medium', 170)">牛奶</button>
                </div>
            </div>
            <button class="btn btn-green" onclick="saveFood()">保存食物</button>
        </div>
    </div>

    <script>
        function openFoodModal() {
            document.getElementById('foodModal').style.display = 'block';
        }
        function closeFoodModal() {
            document.getElementById('foodModal').style.display = 'none';
        }
        function quickAddFood(name, amount, calories) {
            document.getElementById('foodName').value = name;
            document.getElementById('foodAmount').value = amount;
            document.getElementById('foodCalories').value = calories;
        }
        function saveFood() {
            const name = document.getElementById('foodName').value;
            const calories = document.getElementById('foodCalories').value;
            if (name && calories) {
                alert(`已添加：${name} (${calories} kcal)`);
                closeFoodModal();
            } else {
                alert('请填写完整的食物信息');
            }
        }
        function openExerciseModal() { alert('运动记录功能'); }
        function openSleepModal() { alert('睡眠记录功能'); }

        // 点击外部关闭模态框
        window.onclick = function(event) {
            if (event.target.className === 'modal') {
                event.target.style.display = 'none';
            }
        }
    </script>
</body>
</html>
